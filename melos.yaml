name: bluebird

packages:
  - packages/*

ignore:
  - "*example*"

scripts:
  analyze:
    description: Analyze every package.
    run: flutter analyze
  test:
    description: Run the tests in every package that has them.
    run: melos exec --dir-exists=test --order-dependents -- flutter test
  coverage:
    description: Run the tests with coverage in every package that has them.
    run: melos exec --dir-exists=test -- flutter test --coverage
