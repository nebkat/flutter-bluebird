name: ci
permissions: read-all

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install lcov (for the coverage HTML report)
        run: sudo apt-get update && sudo apt-get install -y lcov
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test with coverage
        run: |
          set -e
          for p in packages/*/; do
            if [ -d "${p}test" ]; then
              echo "== flutter test --coverage ${p} =="
              (cd "$p" && flutter test --coverage)
            fi
          done
      - name: Generate combined HTML coverage report
        if: always()
        run: |
          set -e
          lcovs=()
          for p in packages/*/; do
            f="${p}coverage/lcov.info"
            if [ -f "$f" ]; then
              # rewrite package-relative source paths (lib/src/...) to repo-relative
              # (packages/<pkg>/lib/src/...) so one report can span every package
              # without path collisions and genhtml can resolve the sources
              sed -i "s#^SF:#SF:${p}#" "$f"
              cp "$f" "coverage-lcov-$(basename "$p").info"
              lcovs+=("$f")
            fi
          done
          if [ ${#lcovs[@]} -gt 0 ]; then
            genhtml "${lcovs[@]}" --output-directory coverage-html --ignore-errors source --quiet
            cp coverage-lcov-*.info coverage-html/
          fi
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          # artifact root is the report itself, so index.html sits at the top
          path: coverage-html
          if-no-files-found: warn
