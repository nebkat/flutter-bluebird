name: ci
permissions: read-all

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: |
          set -e
          for p in packages/*/; do
            if [ -d "${p}test" ]; then
              echo "== flutter test ${p} =="
              (cd "$p" && flutter test)
            fi
          done
