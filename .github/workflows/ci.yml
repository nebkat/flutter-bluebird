name: ci
permissions: read-all

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test with coverage
        run: |
          set -e
          for p in packages/*/; do
            if [ -d "${p}test" ]; then
              echo "== flutter test --coverage ${p} =="
              (cd "$p" && flutter test --coverage)
            fi
          done
      - name: Merge coverage into a single lcov (repo-relative paths)
        run: |
          set -e
          : > coverage.lcov
          for p in packages/*/; do
            f="${p}coverage/lcov.info"
            if [ -f "$f" ]; then
              # rewrite package-relative source paths (lib/src/...) to repo-relative
              # (packages/<pkg>/lib/src/...) so Coveralls maps them to the repo
              sed "s#^SF:#SF:${p}#" "$f" >> coverage.lcov
            fi
          done
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: coverage.lcov
          # don't fail CI on a coverage-upload hiccup (e.g. before the repo is
          # enabled on coveralls.io) — remove once Coveralls is confirmed working
          fail-on-error: false
