# Publishes every package to pub.dev via OIDC (no long-lived token) on a
# `vX.Y.Z` tag. Lockstep: one version for the whole repo, one tag, all packages
# published together in dependency order.
#
# One-time pub.dev setup, PER package:
#   Admin -> Automated publishing -> Enable publishing from GitHub Actions
#     repository:  nebkat/flutter-bluebird
#     tag pattern: v{{version}}          (the same pattern for every package)
# and create a GitHub environment named `pub.dev` (Settings -> Environments).
#
# Cut a release with `tool/release.sh <version>` (bumps every package + tag), then
# push the tag.

name: publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    permissions:
      id-token: write # required for OIDC auth to pub.dev
    environment: pub.dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - name: Publish all packages in dependency order
        run: |
          set -e
          for pkg in bluebird_platform_interface bluebird_android bluebird_darwin bluebird_web bluebird; do
            echo "::group::publish ${pkg}"
            (cd "packages/${pkg}" && flutter pub publish --force)
            echo "::endgroup::"
          done
