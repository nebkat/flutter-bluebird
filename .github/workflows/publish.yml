# Publishes packages to pub.dev via OIDC (no long-lived token) on a `vX.Y.Z`
# tag, in dependency order. Each package is published at the version in its
# pubspec; versions already on pub.dev are skipped, so a tag that bumps only
# some packages (a patch) publishes just those, not the whole repo.
#
# Auth model: `flutter-actions/setup-pubdev-credentials` requests the short-lived
# OIDC token (audience pub.dev) and runs `dart pub token add`, so `dart pub
# publish` authenticates non-interactively. Without provisioning the token like
# this, pub has no credential and falls back to an interactive OAuth prompt that
# hangs forever in CI. It must run after the Flutter SDK is set up (it calls
# `dart pub token add`).
#
# One-time pub.dev setup, PER package:
#   Admin -> Automated publishing -> Enable publishing from GitHub Actions
#     repository:  nebkat/flutter-bluebird
#     tag pattern: v{{version}}          (the same pattern for every package)
# and create a GitHub environment named `pub.dev` (Settings -> Environments).
#
# Release: bump every package to the new version, commit, then push tag `vX.Y.Z`.

name: publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    permissions:
      id-token: write # required so setup-pubdev-credentials can request the JWT
    environment: pub.dev
    runs-on: ubuntu-latest
    timeout-minutes: 15 # backstop: never let a stuck auth prompt burn the job
    steps:
      - uses: actions/checkout@v5
      # Flutter SDK (provides the `dart` used to publish and by the step below).
      - uses: flutter-actions/setup-flutter@v4.3
      # Requests the OIDC token and runs `dart pub token add` so pub publishes
      # non-interactively. Must come after the Flutter SDK is available.
      - uses: flutter-actions/setup-pubdev-credentials@v1.1
      # Single resolve at the workspace root — members use `resolution: workspace`
      # and cannot be resolved individually.
      - name: Install dependencies
        run: dart pub get
      - name: Publish new packages in dependency order
        run: |
          set -e
          for pkg in bluebird_platform_interface bluebird_android bluebird_darwin bluebird_web bluebird; do
            ver=$(awk '/^version:/{print $2; exit}' "packages/${pkg}/pubspec.yaml")
            # Skip versions already on pub.dev so a patch that bumps only some
            # packages doesn't fail re-publishing the unchanged ones. Only a
            # definitive 200 skips; on any other/uncertain code we still attempt
            # (a loud "already exists" failure beats silently missing a publish).
            code=$(curl -s -o /dev/null -w '%{http_code}' -L "https://pub.dev/api/packages/${pkg}/versions/${ver}" || echo 000)
            if [ "$code" = "200" ]; then
              echo "::notice::${pkg} ${ver} already on pub.dev — skipping"
              continue
            fi
            echo "::group::publish ${pkg} ${ver} (pub.dev check: HTTP ${code})"
            # timeout is a hang-guard: if auth ever regresses to the interactive
            # OAuth prompt, fail fast instead of burning the whole job budget.
            (cd "packages/${pkg}" && timeout 120 dart pub publish --force)
            echo "::endgroup::"
          done
