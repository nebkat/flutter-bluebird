# Builds the example app as a release Android APK on a `vX.Y.Z` tag and attaches
# it to the GitHub Release, so users can download and try the demo without
# building it themselves. Runs alongside `publish` (pub.dev) and `pages` (web
# demo), which trigger on the same tag.
#
# The example signs its release build with the debug key (see the example's
# android/app/build.gradle), so no signing secrets are needed. The APK installs
# fine but users must allow "install from unknown sources" — it's a demo build,
# not a Play Store artifact.

name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write # create/update the GitHub Release and upload the APK asset

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build release APK
        working-directory: packages/bluebird/example
        run: |
          flutter pub get
          flutter build apk --release
      - name: Stage APK with a versioned name
        run: |
          mkdir -p dist
          cp packages/bluebird/example/build/app/outputs/flutter-apk/app-release.apk \
            "dist/bluebird-demo-${{ github.ref_name }}.apk"
      - name: Attach APK to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/bluebird-demo-${{ github.ref_name }}.apk
