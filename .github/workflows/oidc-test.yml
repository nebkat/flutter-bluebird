# TEST-ONLY workflow (branch test/oidc-check). Reproduces publish.yml's auth
# setup — same `id-token: write` permission and `pub.dev` environment — to
# diagnose why `pub publish` falls back to interactive OAuth. Two parts:
#   1. Decode the GitHub OIDC token's claims (proves GitHub mints it correctly).
#   2. Run `flutter pub publish --verbose` so we can SEE whether pub attempts the
#      OIDC exchange and what pub.dev returns, before it silently falls back.
# A branch trigger can't actually publish (dart-lang/pub-dev#8507), so this
# releases nothing. Delete this file + branch once publishing works.

name: oidc-test

on:
  push:
    branches: [test/oidc-check]
  workflow_dispatch:

jobs:
  check:
    permissions:
      id-token: write # same permission publish.yml relies on
    environment: pub.dev # same environment, so the `environment` claim is present
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Print tool versions
        run: |
          flutter --version
          dart --version

      - name: Confirm the OIDC request vars are present
        run: |
          set -euo pipefail
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "::error::id-token NOT available — GitHub did not grant id-token:write to this job."
            exit 1
          fi
          echo "OK: ACTIONS_ID_TOKEN_REQUEST_URL / _TOKEN are set."

      - name: Request a pub.dev-audience token and decode its claims
        run: |
          set -euo pipefail
          jwt=$(curl -sSf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://pub.dev" | jq -r '.value')
          payload=$(cut -d. -f2 <<<"$jwt")
          case $(( ${#payload} % 4 )) in
            2) payload="${payload}==";;
            3) payload="${payload}=";;
          esac
          echo "Decoded OIDC claims:"
          printf '%s' "$payload" | tr '_-' '/+' | base64 -d \
            | jq '{repository, ref, ref_type, event_name, environment, sub, aud}'

      - name: Install dependencies
        run: flutter pub get

      - name: Verbose publish attempt (surfaces pub's OIDC handshake)
        run: |
          # Branch trigger => pub.dev will not accept the publish, so this
          # releases nothing. --verbose shows whether pub requests an OIDC token
          # and pub.dev's exact response, before it falls back to interactive.
          # </dev/null + timeout guarantee it can't hang on the OAuth prompt.
          cd packages/bluebird_platform_interface
          timeout 120 flutter pub publish --force --verbose </dev/null || echo "publish exited with $?"
