name: bluebird_android
description: The Android implementation of bluebird, the Bluetooth Low Energy (BLE) plugin for Flutter.
version: 0.2.0
homepage: https://github.com/nebkat/flutter-bluebird
repository: https://github.com/nebkat/flutter-bluebird
issue_tracker: https://github.com/nebkat/flutter-bluebird/issues

topics:
  - bluetooth
  - ble
  - bluetooth-low-energy

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  bluebird_platform_interface: ^0.2.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    implements: bluebird
    platforms:
      android:
        package: com.lib.bluebird
        pluginClass: BluebirdPlugin
        dartPluginClass: BluebirdAndroid
