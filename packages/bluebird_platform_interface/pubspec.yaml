name: bluebird_platform_interface
description: The common platform interface for bluebird, the Bluetooth Low Energy (BLE) plugin for Flutter.
version: 0.1.0
homepage: https://github.com/nebkat/flutter-bluebird
repository: https://github.com/nebkat/flutter-bluebird
issue_tracker: https://github.com/nebkat/flutter-bluebird/issues

topics:
  - bluetooth
  - ble
  - bluetooth-low-energy

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  # directly imported by the generated messages.g.dart (immutable/protected/...)
  meta: ^1.15.0
  logging: ^1.3.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  pigeon: ^27.1.1
