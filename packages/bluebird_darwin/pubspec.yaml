name: bluebird_darwin
description: iOS and macOS implementation of the bluebird plugin.
version: 1.0.0
homepage: https://github.com/chipweinberger/bluebird

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  bluebird_platform_interface: 1.0.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    implements: bluebird
    platforms:
      ios:
        pluginClass: BluebirdPlugin
        dartPluginClass: BluebirdDarwin
        sharedDarwinSource: true
      macos:
        pluginClass: BluebirdPlugin
        dartPluginClass: BluebirdDarwin
        sharedDarwinSource: true
