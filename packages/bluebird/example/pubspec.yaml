name: bluebird_example
description: Demonstrates how to use the bluebird plugin.

# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none'

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"
resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  bluebird: 0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1

# Launcher icons for every platform, generated from the bluebird icon.
# Regenerate after changing the source image with:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/bluebird-icon.png"
  android: true
  ios: true
  # iOS icons cannot have an alpha channel, so flatten it against white
  remove_alpha_ios: true
  background_color_ios: "#ffffff"
  macos:
    generate: true
    image_path: "assets/bluebird-icon.png"
  web:
    generate: true
    image_path: "assets/bluebird-icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/bluebird.png
    - assets/bluebird-icon.png
