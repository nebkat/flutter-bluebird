name: bluebird
description: A Bluetooth Low Energy (BLE) plugin for Flutter — scan, connect, and read/write GATT on Android, iOS, macOS, and Web.
version: 0.1.0
homepage: https://github.com/nebkat/flutter-bluebird
repository: https://github.com/nebkat/flutter-bluebird
issue_tracker: https://github.com/nebkat/flutter-bluebird/issues

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  # use specific versions.
  #  - users otherwise forget to update all
  #  - simpler bug reporting
  #  - unified changelog
  #  - users can still manually override
  bluebird_platform_interface: 0.1.0
  bluebird_android: 0.1.0
  bluebird_darwin: 0.1.0
  bluebird_web: 0.1.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        default_package: bluebird_android
      ios:
        default_package: bluebird_darwin
      macos:
        default_package: bluebird_darwin
      web:
        default_package: bluebird_web